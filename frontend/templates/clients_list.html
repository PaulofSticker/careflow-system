{% extends 'base.html' %}

{% block content %}

<header class="topbar">
    <div class="topbar-left">
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
        <h1>Clients</h1>
    </div>
    <p>Registered clients in alphabetical order</p>
</header>

<div class="content">

    <h2>Client List</h2>

    {% for client in clients %}
        <div class="card">
            <a href="{% url 'client_detail' client.id %}">
                <strong>{{ client.full_name }}</strong>
            </a><br>
            {{ client.email }}<br>
            {{ client.phone }}<br>
            {{ client.full_address }}<br>
        </div>
    {% empty %}
        <p>No clients found.</p>
    {% endfor %}

</div>

{% endblock %}
