{% extends 'base.html' %}

{% block content %}
<header class="topbar">
    <div class="topbar-left">
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
        <h1>New Package</h1>
    </div>
    <p>Client: {{ client.full_name }}</p>
</header>

<div class="content">
    <div class="card">

        {% if error_message %}
        <div style="background:#ffe8e8; color:#a30000; padding:12px;">
            {{ error_message }}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <label>Package Type</label><br>
            <select name="package_type">
                <option value="single">Single</option>
                <option value="bronze">Bronze</option>
                <option value="silver">Silver</option>
                <option value="gold">Gold</option>
            </select><br><br>

            <label>Total Sessions</label><br>
            <input type="number" name="total_sessions"><br><br>

            <label>Total Price ($)</label><br>
            <input type="number" step="0.01" name="total_price"><br><br>

            <label>Billing Type</label><br>
            <select name="billing_type">
                <option value="full">Full</option>
                <option value="installment">Installment</option>
            </select><br><br>

            <label>Payment Method</label><br>
            <select name="payment_method">
                <option value="card">Card</option>
                <option value="zelle">Zelle</option>
                <option value="cash">Cash</option>
            </select><br><br>

            <label>Installments</label><br>
            <input type="number" name="installment_count" value="1"><br><br>

            <label>Start Date</label><br>
            <input type="date" name="start_date"><br><br>

            <label>End Date</label><br>
            <input type="date" name="end_date"><br><br>

            <button type="submit">Save Package</button>
        </form>
    </div>
</div>
{% endblock %}
